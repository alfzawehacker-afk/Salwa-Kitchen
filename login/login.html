
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مطبخ سلوى</title>
    
    <!-- 1. الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- 2. ملف التنسيق الموحد (الألوان والأنيميشن والشكل البيضاوي) -->
    <link rel="stylesheet" href="style login.css">
    
    <!-- 3. مكتبات Firebase (أساسية عشان كود الدخول يشتغل) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="login-page">

    <!-- زر القائمة العائم -->
    <div class="menu-trigger" id="menuBtn">المزيد</div>

    <!-- القائمة الجانبية (نفس اللي في الرئيسية) -->
    <nav class="oval-menu" id="sideMenu">
        <div class="menu-links">
            <a href="../index.html">الرئيسية</a>
            <a href="../login/login.html">تسجيل الدخول</a>
            <a href="../food healthy/healthy-food.html">أكل صحي</a>
            <a href="../drinkhealthy/healthy-drinks.html">مشروبات صحية</a>
        </div>
    </nav>

    <!-- حاوية الدخول البيضاوية -->
    <main class="login-wrapper">
        <div class="oval-card login-card reveal">
            <h1 class="main-title" style="font-size: 2.5rem;">مطبخ سلوى</h1>
            <p class="slogan">أهلاً بك يا بطل.. سجل دخولك</p>

            <div class="form-container">
                <div class="input-group">
                    <input type="email" id="email" placeholder="البريد الإلكتروني" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="كلمة المرور" required>
                </div>
                
                <!-- زر الدخول مربوط بالـ ID اللي في السكريبت -->
                <button class="login-btn" id="loginBtn">دخول</button>
                
                <!-- رسالة الخطأ -->
                <p class="error-msg" id="error" style="display: none; color: #e74c3c; margin-top: 15px; font-weight: bold;">
                    تأكد من صحة البيانات!
                </p>
            </div>
        </div>
    </main>

    <!-- 4. السكريبتات (الترتيب هنا هو السر) -->
    
    <!-- الأول: سكريبت الحركة والمنيو (script.js) -->
    <script src="script.js"></script>
    
    <!-- الثاني: سكريبت منطق الفايربيز (script login.js) -->
    <script src="script login.js"></script>

</body>
</html>
