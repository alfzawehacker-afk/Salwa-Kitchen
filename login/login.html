<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مطبخ سلوى</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <!-- ✅ إصلاح 1: إزالة المسافة من اسم الملف -->
    <link rel="stylesheet" href="style_login.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="login-page">

    <!-- زر القائمة العائم -->
    <div class="menu-trigger" id="menuBtn">المزيد</div>

    <!-- ✅ إضافة: زر تغيير اللغة بنفس ستايل الصفحة الرئيسية -->
    <div class="lang-switch-container">
        <button class="lang-icon-btn" title="تغيير اللغة / Change Language">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
        </button>
        <button onclick="setLanguage('en')">EN</button>
        <button onclick="setLanguage('ar')">العربية</button>
    </div>

    <!-- ✅ إصلاح 3: إضافة data-i18n لروابط القائمة -->
    <nav class="oval-menu" id="sideMenu">
        <div class="menu-links">
            <a href="../index.html" data-i18n="nav_main">الرئيسية</a>
            <a href="../login/login.html" data-i18n="nav_login">تسجيل الدخول</a>
            <a href="../food healthy/healthy-food.html" data-i18n="nav_healthy">أكل صحي</a>
            <a href="../drinkhealthy/healthy-drinks.html" data-i18n="nav_drinks">مشروبات صحية</a>
        </div>
    </nav>

    <main class="login-wrapper">
        <div class="login-card reveal">
            <h1 class="main-title" data-i18n="login_brand">مطبخ سلوى</h1>
            <p class="slogan" data-i18n="login_welcome">أهلاً بك يا بطل.. سجل دخولك</p>

            <div class="form-container">
                <div class="input-group">
                    <!-- ✅ إضافة data-i18n-placeholder للترجمة -->
                    <input type="email" id="email"
                        data-i18n-placeholder="login_email"
                        placeholder="البريد الإلكتروني" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password"
                        data-i18n-placeholder="login_password"
                        placeholder="كلمة المرور" required>
                </div>

                <button class="login-btn" id="loginBtn" data-i18n="login_btn">دخول</button>

                <p class="error-msg" id="error"
                    style="display:none; color:#e74c3c; margin-top:15px; font-weight:bold;"
                    data-i18n="login_error">
                    تأكد من صحة البيانات!
                </p>
            </div>
        </div>
    </main>

    <!-- ✅ إصلاح 2: إزالة المسافة من اسم الملف -->
    <script src="script_login.js"></script>

</body>
</html>
